version: '3.8'

services:
  # Main API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: abuzahra-api
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID}
      - SERVER_PORT=8443
      - SERVER_DOMAIN=${SERVER_DOMAIN}
      - DATABASE_URL=postgresql://abuzahra:abuzahra_secret@postgres:5432/abuzahra
      - REDIS_URL=redis://redis:6379/0
      - SENTRY_DSN=${SENTRY_DSN:-}
      - PROMETHEUS_ENABLED=true
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - abuzahra-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: abuzahra-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=abuzahra
      - POSTGRES_PASSWORD=abuzahra_secret
      - POSTGRES_DB=abuzahra
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abuzahra"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abuzahra-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: abuzahra-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - abuzahra-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: abuzahra-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - abuzahra-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: abuzahra-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=abuzahra_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - abuzahra-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: abuzahra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    networks:
      - abuzahra-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  abuzahra-network:
    driver: bridge
