name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew
      
    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      
    - name: Rename APK
      working-directory: ./android/app/build/outputs/apk/debug
      run: mv app-debug.apk AbuZahra-Admin-v5.0.0.apk || true
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AbuZahra-Admin-v5.0.0
        path: android/app/build/outputs/apk/debug/*.apk
        
    - name: Upload to Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v5.0.0
        name: Abu-Zahra Admin v5.0.0
        files: android/app/build/outputs/apk/debug/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

